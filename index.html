function RotatingWord({ words, interval = 2100 }) {
  const [i, setI] = useState(0);
  useEffect(() => {
    const id = setInterval(() => setI((p) => (p + 1) % words.length), interval);
    return () => clearInterval(id);
  }, [words.length, interval]);
  return <span className="rot" key={i}>{words[i]}</span>;
}

function Modal({ data, onClose }) {
  useEffect(() => {
    if (!data) return;
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [data, onClose]);
  if (!data) return null;
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()} role="dialog" aria-modal="true">
        <div className="modal-head">
          <h3>{data.title}</h3>
          <button className="modal-close" onClick={onClose} aria-label="Close">×</button>

const GREETING = {
  role: "assistant",
  content:
    "Hi — I'm your Business AI Entity Advisor. Ask me anything about LLCs, S-corps, EINs, privacy structures, or building business credit, and I'll keep it clear and simple. What are you looking to set up?",
};

function ConsultantChat() {
  const [messages, setMessages] = useState([GREETING]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const bodyRef = useRef(null);

  useEffect(() => {
    if (bodyRef.current) bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
  }, [messages, loading]);

  function resetChat() {
    setMessages([GREETING]);
    setInput("");
  }

  async function send(text) {
    const content = (text ?? input).trim();
    if (!content || loading) return;
    const next = [...messages, { role: "user", content }];
    setMessages(next);
    setInput("");
    setLoading(true);

    // Not connected to a secure backend yet -> warm fallback, no error.
    if (!AI_CONFIG.useDirectPreview && AI_CONFIG.productionEndpoint.indexOf("YOUR-PROJECT") !== -1) {
      setTimeout(() => {
        setMessages([...next, { role: "assistant", content: AI_CONFIG.offlineMessage }]);
        setLoading(false);
      }, 650);
      return;
    }

    try {
      let reply = "";
      if (AI_CONFIG.useDirectPreview) {
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-6",
            max_tokens: 1000,
            system: SYSTEM_PROMPT,
            messages: next.map((m) => ({ role: m.role, content: m.content })),
          }),
        });
        const data = await res.json();
        reply = (data.content || []).map((i) => i.text || "").join("\n").trim();
      } else {
        const res = await fetch(AI_CONFIG.productionEndpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: next }),
        });
        const data = await res.json();
        reply = data.reply || data.content || "";
      }
      setMessages([...next, { role: "assistant", content: reply || "Sorry, I didn't catch that — could you ask again?" }]);
    } catch (e) {
      setMessages([...next, { role: "assistant", content: "I'm having trouble connecting right now. Please try again in a moment." }]);
    } finally {
      setLoading(false);
    }
  }

  return (
    <div className="chat">
      <div className="chat-top">
        <div className="chat-id">
          <div className="name">Business AI Entity Advisor</div>
          <div className="role">Seasoned structuring &amp; formation guide</div>
        </div>
        <div className="chat-tools">
          <span className="dot" title="Online" />
          {messages.length > 1 && (
            <button className="chat-reset" onClick={resetChat} aria-label="Start a new chat">New chat</button>
          )}
        </div>
      </div>
      <div className="chat-disc">
        <b>AI can make mistakes.</b> Please double-check important information.
      </div>
      <div className="chat-body" ref={bodyRef}>
        {messages.map((m, i) => (
          <div key={i} className={`msg ${m.role === "user" ? "me" : "bot"}`}>{m.content}</div>
        ))}
        {loading && (
          <div className="msg bot"><span className="typing-dots"><i /><i /><i /></span></div>
        )}
      </div>
      {messages.length <= 1 && (
        <div className="chips">
          {STARTERS.map((q) => (
            <button key={q} className="chip" onClick={() => send(q)}>{q}</button>
          ))}
        </div>
      )}
      <div className="chat-input">
        <input
          value={input}
          placeholder="Ask about entities, structures, or business credit…"
          onChange={(e) => setInput(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter") send(); }}
          aria-label="Ask the business entity advisor"
        />
        <button className="send" onClick={() => send()} disabled={loading || !input.trim()}>Send</button>
      </div>
    </div>
  );
}
